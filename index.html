<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>沧渊阁</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    height:100%;
    font-family:"Microsoft YaHei",sans-serif;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(2,6,23,0.55),rgba(2,6,23,0.75)),
    url("bg.jpg");
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 颗粒 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.12;
    animation:grain 8s infinite;
    z-index:-1;
}
@keyframes grain{
    0%{transform:translate(0,0)}
    50%{transform:translate(-5%,5%)}
    100%{transform:translate(0,0)}
}

/* 标题 */
h1{
    font-family:'Noto Serif SC', serif;
    font-size:90px;
    color:#1e3a8a;
    text-align:center;
    margin-top:60px;
}

/* ID */
.id{
    text-align:center;
    color:#cbd5f5;
    margin-top:10px;
    font-size:18px;
}

/* 倒计时 */
#countdown{
    text-align:center;
    margin-top:20px;
    font-size:28px;
    color:#38bdf8;
}

/* 标题 */
.section-title{
    text-align:center;
    margin-top:40px;
    font-size:32px;
    color:#e2e8f0;
}

/* 卡片 */
.timeline{
    width:800px;
    margin:40px auto;
}

.item{
    background:rgba(15,23,42,0.6);
    backdrop-filter:blur(10px);
    padding:24px;
    margin:18px 0;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    font-size:24px;
    transition:0.3s;
}

/* 左侧 */
.left{
    display:flex;
    align-items:center;
    gap:12px;
    color:#38bdf8;
    font-weight:600;
}

/* 右侧 */
.right{
    color:#93c5fd;
}

/* 图标 */
.icon{
    font-size:22px;
}

/* 高亮 */
.active{
    border:1px solid #38bdf8;
    box-shadow:0 0 25px #38bdf8;
    transform:scale(1.05);
}

/* 左右装饰 */
.left-deco{
    position:fixed;
    left:30px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:42px;
    color:#38bdf8;
}

.right-deco{
    position:fixed;
    right:30px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:24px;
    color:#38bdf8;
}

/* 按钮 */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:240px;
    margin:40px auto;
    padding:16px;
    border-radius:30px;
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    color:white;
    text-decoration:none;
    font-size:20px;
}

footer{
    text-align:center;
    color:#94a3b8;
    margin:20px;
}
</style>
</head>

<body>

<div class="left-deco">沧渊阁</div>
<div class="right-deco">兄弟集结 · 共闯江湖 · 沧渊为王</div>

<h1>沧渊阁</h1>
<div class="id">ID: 10260103</div>

<div id="countdown">加载中...</div>

<div class="section-title">百业活动时间表</div>

<div class="timeline" id="timeline"></div>

<a class="btn" href="#">
<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="white" viewBox="0 0 16 16">
<path d="M13.545 2.907a13.227 13.227 0 0 0-3.167-.981.05.05 0 0 0-.053.025c-.137.25-.289.577-.396.837a12.19 12.19 0 0 0-3.858 0 8.404 8.404 0 0 0-.401-.837.05.05 0 0 0-.053-.025 13.19 13.19 0 0 0-3.167.981.041.041 0 0 0-.019.019C.533 6.007-.32 9.057.099 12.07a.043.043 0 0 0 .016.03 13.344 13.344 0 0 0 4.077 2.07.05.05 0 0 0 .055-.019c.314-.43.593-.885.83-1.36a.05.05 0 0 0-.028-.069 8.765 8.765 0 0 1-1.248-.595.05.05 0 0 1-.005-.084c.084-.063.168-.129.248-.195a.05.05 0 0 1 .052-.007c2.619 1.197 5.457 1.197 8.044 0a.05.05 0 0 1 .053.006c.08.066.164.132.248.195a.05.05 0 0 1-.004.084 8.69 8.69 0 0 1-1.249.596.05.05 0 0 0-.027.068c.24.475.519.93.829 1.36a.05.05 0 0 0 .056.019 13.31 13.31 0 0 0 4.077-2.07.05.05 0 0 0 .016-.03c.5-3.177-.838-6.202-2.354-9.145a.041.041 0 0 0-.019-.019z"/>
</svg>
加入 Discord
</a>

<footer>© 2026 沧渊阁 · Probieee</footer>

<script>
function getIcon(name){
    if(name.includes("派")) return "🎉";
    if(name.includes("副")) return "⚔️";
    if(name.includes("戰")) return "🔥";
    if(name.includes("決")) return "🏆";
    if(name.includes("破")) return "⚡";
    return "📌";
}

const events=[
{name:"百業派對",days:[0,1,2,3,4,5,6],start:1380,duration:60,text:"每晚 23:00"},
{name:"百業副本",days:[1,3,5],start:1260,duration:30,text:"周一/三/五 21:00-21:30"},
{name:"百葉戰爭",days:[0,6],start:1320,duration:60,text:"周六/周日 22:00-23:00（联赛周六20:30）"},
{name:"一決高下",days:[2,4],start:1260,duration:60,text:"周二/周四 21:00-22:00"},
{name:"破軍殺將",days:[2,4],start:1320,duration:60,text:"周二/周四 22:00-23:00"}
];

function getNow(){
    const n=new Date();
    return{day:n.getDay(),time:n.getHours()*60+n.getMinutes()};
}

function getNext(){
    const now=getNow();
    let min=999999,next=null;

    events.forEach(e=>{
        e.days.forEach(d=>{
            let diff=(d-now.day+7)%7;
            let t=diff*1440+e.start-now.time;
            if(diff===0&&e.start<=now.time)t+=10080;
            if(t<min){min=t;next=e;}
        });
    });

    return{event:next,minutes:min};
}

function render(){
    const now=getNow();
    const box=document.getElementById("timeline");
    box.innerHTML="";

    events.forEach(e=>{
        let active=false;
        if(e.days.includes(now.day)){
            if(now.time>=e.start&&now.time<=e.start+e.duration){
                active=true;
            }
        }

        box.innerHTML+=`
        <div class="item ${active?"active":""}">
            <div class="left">
                <span class="icon">${getIcon(e.name)}</span>
                ${e.name}
            </div>
            <div class="right">${e.text}</div>
        </div>`;
    });

    const next=getNext();
    const h=Math.floor(next.minutes/60);
    const m=next.minutes%60;

    document.getElementById("countdown").innerText=
    "下一场："+next.event.name+"（"+h+"小时"+m+"分钟）";
}

setInterval(render,1000);
render();
</script>

</body>
</html>
