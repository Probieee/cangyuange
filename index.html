<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>沧渊阁</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:#cfefff;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(2,6,23,0.45), rgba(2,6,23,0.75)),
    url("bg.jpg");
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 颗粒 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.08;
    z-index:-1;
}

/* 标题 */
h1{
    font-family:"Noto Serif SC",serif;
    font-size:60px;
    color:#77B3D4;
    text-align:center;
    margin-top:40px;
}

/* 导航 */
.nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.nav button{
    padding:10px 25px;
    border:none;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    color:#cfefff;
    cursor:pointer;
    font-size:16px;
}

.nav button.active{
    background:#38bdf8;
    color:black;
}

/* 页面 */
.page{
    display:none;
    animation:fade 0.5s;
}

.page.active{
    display:block;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}

/* 招募 */
.guild-box{
    width:780px;
    margin:30px auto;
    padding:25px;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

/* 时间 */
.timeline{
    width:780px;
    margin:30px auto;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:18px;
    margin:10px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.07);
}

.active{
    box-shadow:0 0 15px #38bdf8;
}

/* 按钮 */
.btn{
    display:block;
    width:200px;
    margin:30px auto;
    text-align:center;
    padding:12px;
    border-radius:25px;
    background:#38bdf8;
    color:black;
    text-decoration:none;
}
</style>
</head>

<body>

<h1>沧渊阁</h1>

<!-- 导航 -->
<div class="nav">
    <button class="active" onclick="showPage('guild',this)">招募</button>
    <button onclick="showPage('event',this)">活动</button>
</div>

<!-- 招募页面 -->
<div id="guild" class="page active">
    <div class="guild-box">
        <p>🇲🇾〖沧渊阁〗6級百業招賢</p>
        <p>◎ 探索与休闲 · 轻松活跃</p>
        <p>◎ DC群提醒活动 ❤️</p>
        <p>◎ 不强制PVP</p>
        <p>🌙 夜猫 · 🀄 麻将 · 🔥 活跃玩家</p>
    </div>
</div>

<!-- 活动页面 -->
<div id="event" class="page">
    <div id="nextEvent" style="text-align:center;margin:15px;"></div>

    <div class="timeline">
        <div class="item" id="party">🎉 百業派對 - 23:00</div>
        <div class="item" id="dungeon">⚔ 副本 - 21:00</div>
        <div class="item" id="war">🔥 战争 - 22:00</div>
        <div class="item" id="duel">🏆 一决 - 21:00</div>
        <div class="item" id="kill">⚡ 破军 - 22:00</div>
    </div>
</div>

<a class="btn" href="https://discord.gg/cangyuancrew" target="_blank">
加入 Discord
</a>

<script>
function showPage(id,btn){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}
</script>

</body>
</html>
