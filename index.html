<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 江湖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    background:#020617;
    color:white;
    overflow-x:hidden;
}

/* 视频背景 */
.video-bg{
    position:fixed;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    filter:brightness(0.5) saturate(1.2);
}

/* 彩色遮罩 */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(180deg,#020617cc,#020617);
    z-index:-1;
}

/* 导航 */
nav{
    position:fixed;
    width:100%;
    top:0;
    padding:20px;
    text-align:center;
    background:rgba(2,6,23,0.6);
    backdrop-filter:blur(10px);
}

nav a{
    color:#cbd5f5;
    margin:0 25px;
    text-decoration:none;
    letter-spacing:2px;
}

nav a:hover{
    color:#facc15;
}

/* 首页 */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:80px;
    letter-spacing:8px;
    background:linear-gradient(90deg,#60a5fa,#facc15);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    color:#94a3b8;
}

/* 按钮 */
.btn{
    margin-top:30px;
    padding:15px 40px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:linear-gradient(135deg,#3b82f6,#facc15);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.15);
    box-shadow:0 0 25px #facc15;
}

/* 区块 */
section{
    padding:120px 20px;
    text-align:center;
}

h2{
    font-size:36px;
    margin-bottom:40px;
    color:#facc15;
}

/* 卡片 */
.grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.card{
    width:260px;
    margin:20px;
    padding:30px;
    border-radius:15px;
    background:rgba(30,41,59,0.8);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 20px #3b82f6;
}

/* 门派展示 */
.feature{
    margin:50px auto;
    max-width:900px;
    padding:40px;
    border-radius:20px;
    background:rgba(15,23,42,0.8);
}

/* 倒计时 */
.countdown{
    margin-top:20px;
    color:#38bdf8;
}

/* 页脚 */
footer{
    padding:40px;
    text-align:center;
    color:#64748b;
}
</style>

</head>

<body>

<!-- 视频 -->
<video class="video-bg" autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-mountain-landscape-1573/1080p.mp4">
</video>

<div class="overlay"></div>

<nav>
<a href="#home">首页</a>
<a href="#feature">江湖玩法</a>
<a href="#guide">活动</a>
<a href="#join">加入</a>
</nav>

<!-- 首页 -->
<section id="home" class="hero">
<h1>沧渊阁</h1>
<p>武侠 · 荣耀 · 群雄逐鹿</p>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
🚀 加入公会
</a>

<div class="countdown" id="countdown"></div>
</section>

<!-- 玩法 -->
<section id="feature">
<h2>江湖玩法</h2>

<div class="feature">
<p>自由武学搭配 · 开放世界探索 · 百业争锋</p>
</div>

</section>

<!-- 活动 -->
<section id="guide">
<h2>公会活动</h2>

<div class="grid">
<div class="card">🎉 百业派对<br>每日23:00</div>
<div class="card">⚔ 副本<br>一/三/五 21:30</div>
<div class="card">🔥 百业战争<br>周末22:00</div>
<div class="card">👥 固定联<br>周末20:30</div>
</div>

</section>

<!-- 加入 -->
<section id="join">
<h2>加入沧渊阁</h2>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
立即加入
</a>

<p style="margin-top:15px;color:#94a3b8;">
discord.gg/cangyuancrew
</p>

</section>

<footer>
© 2026 沧渊阁 · 江湖不散
</footer>

<script>
function updateCountdown(){
    const now=new Date();
    const target=new Date();
    target.setHours(23,0,0,0);

    if(now>target) target.setDate(target.getDate()+1);

    const diff=target-now;
    const h=Math.floor(diff/1000/60/60);
    const m=Math.floor(diff/1000/60)%60;

    document.getElementById("countdown").innerText=
    "距离百业派对："+h+"小时 "+m+"分钟";
}
setInterval(updateCountdown,1000);
</script>

</body>
</html>
