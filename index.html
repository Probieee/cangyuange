<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>沧渊阁</title>

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    font-family:"Microsoft YaHei",sans-serif;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(2,6,23,0.55),rgba(2,6,23,0.75)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    z-index:-2;
}

/* 颗粒动态 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.15;
    animation:grain 8s infinite;
    z-index:-1;
}

@keyframes grain{
    0%{transform:translate(0,0)}
    25%{transform:translate(-5%,5%)}
    50%{transform:translate(5%,-5%)}
    75%{transform:translate(-3%,3%)}
    100%{transform:translate(0,0)}
}

/* 标题 */
h1{
    font-family:'Noto Serif SC', serif;
    font-size:90px;
    color:#1e3a8a; /* 深蓝 */
    text-align:center;
    margin-top:60px;
}

/* ID */
.id{
    text-align:center;
    color:#cbd5f5;
    margin-top:10px;
    font-size:18px;
}

/* 倒计时 */
#countdown{
    text-align:center;
    margin-top:20px;
    font-size:26px;
    color:#38bdf8;
}

/* 标题 */
.section-title{
    text-align:center;
    margin-top:40px;
    font-size:30px;
    color:#e2e8f0;
}

/* 卡片 */
.timeline{
    width:800px;
    margin:40px auto;
}

/* 项目 */
.item{
    background:rgba(255,255,255,0.05);
    padding:22px;
    margin:15px 0;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    font-size:22px;
    transition:0.3s;
}

/* 高亮 */
.active{
    border:1px solid #38bdf8;
    box-shadow:0 0 25px #38bdf8;
    transform:scale(1.05);
}

/* 左右装饰 */
.left-deco{
    position:fixed;
    left:30px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:38px;
    color:#38bdf8;
}

.right-deco{
    position:fixed;
    right:30px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:22px;
    color:#38bdf8;
}

/* 按钮 */
.btn{
    display:block;
    width:220px;
    margin:40px auto;
    text-align:center;
    padding:14px;
    border-radius:30px;
    background:linear-gradient(90deg,#2563eb,#38bdf8);
    color:white;
    text-decoration:none;
    font-size:18px;
}

/* 页脚 */
footer{
    text-align:center;
    color:#94a3b8;
    margin:20px;
}
</style>
</head>

<body>

<div class="left-deco">沧渊阁</div>
<div class="right-deco">兄弟集结 · 共闯江湖 · 沧渊为王</div>

<h1>沧渊阁</h1>
<div class="id">ID: 10260103</div>

<div id="countdown">加载中...</div>

<div class="section-title">百业活动时间表</div>

<div class="timeline" id="timeline"></div>

<a class="btn" href="#">
🎮 加入 Discord
</a>

<footer>© 2026 沧渊阁 · Probieee</footer>

<script>
const events = [
{ name:"百業派對", days:[0,1,2,3,4,5,6], start:23*60, text:"每晚 23:00" },

{ name:"百業副本", days:[1,3,5], start:21*60, text:"周一/三/五 21:00-21:30" },

{ name:"百葉戰爭", days:[0,6], start:22*60, text:"周六/周日 22:00-23:00（联赛周六20:30）" },

{ name:"一決高下", days:[2,4], start:21*60, text:"周二/周四 21:00-22:00" },

{ name:"破軍殺將", days:[2,4], start:22*60, text:"周二/周四 22:00-23:00" }
];

function getNow(){
    const now=new Date();
    return {
        day:now.getDay(),
        time:now.getHours()*60+now.getMinutes()
    };
}

function getNextEvent(){
    const now=getNow();
    let min=999999;
    let next=null;

    events.forEach(e=>{
        e.days.forEach(d=>{
            let diff=(d-now.day+7)%7;
            let t=diff*1440+e.start-now.time;

            if(diff===0 && e.start<=now.time){
                t+=7*1440;
            }

            if(t<min){
                min=t;
                next=e;
            }
        });
    });

    return {event:next,minutes:min};
}

function render(){
    const now=getNow();
    const wrap=document.getElementById("timeline");
    wrap.innerHTML="";

    events.forEach(e=>{
        let active=false;

        if(e.days.includes(now.day)){
            if(now.time>=e.start && now.time<=e.start+60){
                active=true;
            }
        }

        wrap.innerHTML+=`
        <div class="item ${active?"active":""}">
            <div>${e.name}</div>
            <div>${e.text}</div>
        </div>`;
    });

    const next=getNextEvent();
    const h=Math.floor(next.minutes/60);
    const m=next.minutes%60;

    document.getElementById("countdown").innerText=
    "下一场："+next.event.name+"（"+h+"小时"+m+"分钟）";
}

setInterval(render,1000);
render();
</script>

</body>
</html>
