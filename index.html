<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沧渊阁 · 百业网</title>

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* 背景（用 logo.png） */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(2,6,23,0.85),rgba(2,6,23,0.95)),
    url("logo.png");
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* 标题 */
h1{
    font-family:'Ma Shan Zheng',cursive;
    font-size:80px;
    margin-top:40px;
    color:#38bdf8;
    text-shadow:
        0 0 10px #22d3ee,
        0 0 30px #22d3ee,
        0 0 60px #0ea5e9;
}

/* 副信息 */
p{
    margin-top:10px;
    color:#94a3b8;
}

/* 倒计时 */
#countdown{
    margin-top:15px;
    font-size:20px;
    color:#22d3ee;
}

/* 时间轴 */
.timeline{
    margin:50px auto;
    width:90%;
    max-width:700px;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    margin:10px 0;
    border-radius:10px;
    background:rgba(255,255,255,0.05);
    transition:0.3s;
}

/* 当前活动高亮 */
.active{
    background:rgba(56,189,248,0.2);
    box-shadow:0 0 20px #22d3ee;
    transform:scale(1.05);
}

/* 按钮 */
.btn{
    display:inline-block;
    margin:40px auto;
    padding:12px 30px;
    border-radius:30px;
    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
}

/* 页脚 */
footer{
    margin:30px;
    color:#94a3b8;
}
</style>
</head>

<body>

<h1>沧渊阁</h1>
<p>ID: 10260103</p>
<div id="countdown">加载中...</div>

<!-- 时间轴 -->
<div class="timeline">

<div class="item" id="e1">
<span>🎉 百业派对</span>
<span>每日 23:00</span>
</div>

<div class="item" id="e2">
<span>⚔ 百业副本</span>
<span>一/三/五 21:30</span>
</div>

<div class="item" id="e3">
<span>🔥 百业战争</span>
<span>周末 22:00</span>
</div>

<div class="item" id="e4">
<span>🏆 一决高下</span>
<span>周二/四 21:00</span>
</div>

<div class="item" id="e5">
<span>⚡ 破军杀将</span>
<span>周二/四 22:00</span>
</div>

</div>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">🚀 加入 Discord</a>

<footer>© 2026 沧渊阁 · Probieee</footer>

<script>
function getNextEvent(){
    const now = new Date();
    const day = now.getDay();
    const time = now.getHours()*60 + now.getMinutes();

    const events = [
        {name:"百业派对",days:"all",start:1380,id:"e1"}, //23:00
        {name:"百业副本",days:[1,3,5],start:1290,id:"e2"}, //21:30
        {name:"百业战争",days:[6,0],start:1320,id:"e3"}, //22:00
        {name:"一决高下",days:[2,4],start:1260,id:"e4"}, //21:00
        {name:"破军杀将",days:[2,4],start:1320,id:"e5"} //22:00
    ];

    let next=null;
    let min=999999;

    events.forEach(e=>{
        let days = e.days==="all" ? [0,1,2,3,4,5,6] : e.days;

        days.forEach(d=>{
            let diffDay = (d-day+7)%7;
            let diffTime = diffDay*1440 + e.start - time;

            if(diffTime>=0 && diffTime<min){
                min = diffTime;
                next = e;
            }
        });
    });

    return {event:next,minutes:min};
}

function update(){
    const data = getNextEvent();

    if(!data.event){
        document.getElementById("countdown").innerText="加载中...";
        return;
    }

    const h = Math.floor(data.minutes/60);
    const m = data.minutes%60;

    document.getElementById("countdown").innerText =
    "下一场：" + data.event.name + "（"+h+"小时 "+m+"分钟）";

    // 清除高亮
    document.querySelectorAll(".item").forEach(i=>i.classList.remove("active"));

    // 高亮当前
    document.getElementById(data.event.id).classList.add("active");
}

setInterval(update,1000);
update();
</script>

</body>
</html>
