<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 百业网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    background:#020617;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(2,6,23,0.85),rgba(2,6,23,0.95)),
    url('logo.png');
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* 首页 */
.hero{
    padding:120px 20px 40px;
    text-align:center;
}

h1{
    font-size:70px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.slogan{
    margin-top:10px;
    color:#cbd5f5;
}

/* 倒计时 */
#countdown{
    margin-top:10px;
    font-size:18px;
    color:#38bdf8;
}

/* 时间轴 */
.timeline{
    max-width:900px;
    margin:20px auto 60px;
    position:relative;
}

.timeline::before{
    content:'';
    position:absolute;
    left:50%;
    width:2px;
    height:100%;
    background:#22d3ee;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:40px 0;
}

.time{
    width:45%;
    text-align:right;
    color:#38bdf8;
}

.content{
    width:45%;
    padding:20px;
    background:rgba(15,23,42,0.7);
    border-radius:10px;
}

/* 当前活动 */
.active .content{
    border:2px solid #22d3ee;
    box-shadow:0 0 25px #22d3ee;
}

/* 🔥 游戏按钮 */
.btn-wrap{
    text-align:center;
    margin:80px 0;
}

.game-btn{
    position:relative;
    display:inline-block;
    padding:15px 50px;
    font-size:18px;
    color:#fff;
    text-decoration:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#22d3ee);
    overflow:hidden;
    box-shadow:0 0 20px rgba(34,211,238,0.5);
}

/* 光扫效果 */
.game-btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transition:0.5s;
}

.game-btn:hover::before{
    left:100%;
}

/* hover */
.game-btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 35px #22d3ee;
}

/* 页脚 */
footer{
    text-align:center;
    padding:30px;
}
</style>
</head>

<body>

<section class="hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>
<p class="slogan">江湖未定 · 沧渊为王</p>
<div id="countdown">系统运行中...</div>
</section>

<h2 style="text-align:center;">百業活動時間表</h2>

<div class="timeline">

<div class="item">
<div class="time">每日 23:00</div>
<div class="content">🎉 百業派對</div>
</div>

<div class="item">
<div class="time">一 / 三 / 五</div>
<div class="content">⚔ 百業副本</div>
</div>

<div class="item">
<div class="time">周末</div>
<div class="content">🔥 百葉戰爭</div>
</div>

<div class="item">
<div class="time">周二 / 周四</div>
<div class="content">🏆 一決高下</div>
</div>

<div class="item">
<div class="time">周二 / 周四</div>
<div class="content">⚡ 破軍殺將</div>
</div>

</div>

<!-- 🔥 按钮 -->
<div class="btn-wrap">
<a href="https://discord.gg/cangyuancrew" target="_blank" class="game-btn">
🚀 加入 Discord
</a>
</div>

<footer>
© 2026 沧渊阁 · Probieee
</footer>
    
 <script>
function getNextEvent(){
    const now = new Date();
    const currentDay = now.getDay();
    const currentTime = now.getHours()*60 + now.getMinutes();

    const events = [
        {name:"百業派對", days:"all", start:"23:00"},
        {name:"百業副本", days:"1,3,5", start:"21:30"},
        {name:"百葉戰爭", days:"6,0", start:"22:00"},
        {name:"一決高下", days:"2,4", start:"21:00"},
        {name:"破軍殺將", days:"2,4", start:"22:00"}
    ];

    let nextEvent = null;
    let minDiff = 999999;

    events.forEach(e=>{
        const [sh, sm] = e.start.split(":").map(Number);
        const startTime = sh*60 + sm;

        let validDays = [];

        if(e.days === "all"){
            validDays = [0,1,2,3,4,5,6];
        }else{
            validDays = e.days.split(",").map(Number);
        }

        validDays.forEach(day=>{
            let diffDay = (day - currentDay + 7) % 7;
            let diffTime = diffDay*1440 + startTime - currentTime;

            if(diffTime < 0) diffTime += 7*1440;

            if(diffTime < minDiff){
                minDiff = diffTime;
                nextEvent = e.name;
            }
        });
    });

    return {name: nextEvent, minutes: minDiff};
}

function updateCountdown(){
    const data = getNextEvent();

    if(!data.name){
        document.getElementById("countdown").innerText = "加载中...";
        return;
    }

    const h = Math.floor(data.minutes/60);
    const m = data.minutes%60;

    document.getElementById("countdown").innerText =
    "下一场："+data.name+"（"+h+"小时 "+m+"分钟）";
}  // 

setInterval(updateCountdown,1000);
updateCountdown();
</script>
    
</body>
</html>
