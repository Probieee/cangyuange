<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沧渊阁 · 百业网</title>

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    font-family:"Microsoft YaHei",sans-serif;
    background:black;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(2,6,23,0.75), rgba(2,6,23,0.95)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    z-index:-1;
}

/* 主体 */
.hero{
    text-align:center;
    padding-top:80px;
}

/* 标题（已调暗） */
h1{
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-size:85px;
    color:#7dd3fc;

    text-shadow:
        0 0 6px rgba(56,189,248,0.4),
        0 0 15px rgba(14,165,233,0.3);

    letter-spacing:6px;
}

/* ID */
.hero p{
    font-size:18px;
    color:#94a3b8;
    margin-top:10px;
}

/* 倒计时 */
#countdown{
    margin-top:20px;
    font-size:24px;
    color:#22d3ee;
}

/* 标题 */
.section-title{
    margin-top:40px;
    font-size:28px;
    color:#e2e8f0;
}

/* 卡片 */
.timeline{
    width:800px;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
}

/* 行 */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 25px;
    margin:12px 0;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    font-size:18px;
    transition:0.3s;
}

/* 高亮 */
.active{
    background:rgba(34,211,238,0.2);
    box-shadow:0 0 25px #22d3ee;
    transform:scale(1.05);
}

/* 按钮 */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-top:40px;
    padding:16px 45px;
    border-radius:40px;
    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #22d3ee;
}

/* footer */
footer{
    margin-top:40px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<section class="hero">
    <h1>沧渊阁</h1>
    <p>ID: 10260103</p>

    <div id="countdown">加载中...</div>

    <div class="section-title">百业活动时间表</div>

    <div class="timeline">

        <div class="item" data-time="23:00">
            🎉 百業派對
            <span>每日 23:00</span>
        </div>

        <div class="item" data-time="21:00">
            ⚔ 百業副本
            <span>一/三/五 21:00-21:30</span>
        </div>

        <div class="item" data-time="22:00">
            🔥 百葉戰爭
            <span>周末 22:00-23:00（联赛周六20:30）</span>
        </div>

        <div class="item" data-time="21:00">
            🏆 一決高下
            <span>周二/周四 21:00-22:00</span>
        </div>

        <div class="item" data-time="22:00">
            ⚡ 破軍殺將
            <span>周二/周四 22:00-23:00</span>
        </div>

    </div>

    <a href="https://discord.gg/" class="btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" width="20">
        加入 Discord
    </a>

</section>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

<script>
function updateCountdown(){
    const now = new Date();
    const current = now.getHours()*60 + now.getMinutes();

    const events = [
        {name:"百業派對", time:23*60},
        {name:"百業副本", time:21*60},
        {name:"百葉戰爭", time:22*60},
        {name:"一決高下", time:21*60},
        {name:"破軍殺將", time:22*60},
    ];

    let minDiff = 9999;
    let next = "";

    events.forEach(e=>{
        let diff = e.time - current;
        if(diff < 0) diff += 1440;
        if(diff < minDiff){
            minDiff = diff;
            next = e.name;
        }
    });

    const h = Math.floor(minDiff/60);
    const m = minDiff%60;

    document.getElementById("countdown").innerText =
        "下一场："+ next +"（"+h+"小时 "+m+"分钟）";
}

setInterval(updateCountdown,1000);
updateCountdown();

/* 高亮当前 */
function highlight(){
    const now = new Date();
    const current = now.getHours()*60 + now.getMinutes();

    document.querySelectorAll(".item").forEach(el=>{
        const t = el.dataset.time.split(":");
        const time = t[0]*60 + parseInt(t[1]);

        if(Math.abs(time - current) < 60){
            el.classList.add("active");
        }else{
            el.classList.remove("active");
        }
    });
}

setInterval(highlight,5000);
highlight();
</script>

</body>
</html>
