<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 百业网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    background:#020617;
    overflow-x:hidden;
}

/* 🌌 背景 */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(2,6,23,0.8),rgba(2,6,23,0.95)),
    url('logo.png');
    background-size:cover;
    background-position:center;
    z-index:-3;
}

/* ✨ 粒子 */
canvas{
    position:fixed;
    z-index:-2;
}

/* 首页 */
.hero{
    padding:120px 20px 40px;
    text-align:center;
}

/* 标题 */
h1{
    font-size:72px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.slogan{
    margin-top:10px;
    color:#cbd5f5;
}

/* 倒计时 */
#countdown{
    margin-top:15px;
    font-size:20px;
    color:#38bdf8;
}

/* 分隔 */
.divider{
    width:200px;
    height:2px;
    background:linear-gradient(90deg,transparent,#22d3ee,transparent);
    margin:20px auto;
}

/* 时间轴 */
.timeline{
    max-width:900px;
    margin:20px auto 60px;
    position:relative;
}

.timeline::before{
    content:'';
    position:absolute;
    left:50%;
    width:2px;
    height:100%;
    background:#22d3ee;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:40px 0;
    opacity:0;
    transform:translateY(40px);
    transition:0.6s;
}

.item.show{
    opacity:1;
    transform:translateY(0);
}

.time{
    width:45%;
    text-align:right;
    color:#38bdf8;
}

.content{
    width:45%;
    padding:20px;
    background:rgba(15,23,42,0.7);
    border-radius:10px;
    position:relative;
}

/* 当前活动 */
.active .content{
    border:2px solid #22d3ee;
    box-shadow:0 0 25px #22d3ee;
}

/* 🔥 进行中标签 */
.tag{
    position:absolute;
    top:-10px;
    right:-10px;
    background:#22d3ee;
    color:#000;
    padding:5px 10px;
    font-size:12px;
    border-radius:5px;
}

/* 按钮 */
.btn{
    display:block;
    margin:60px auto;
    padding:15px 40px;
    background:linear-gradient(135deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #22d3ee;
}

footer{
    text-align:center;
    padding:30px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<section class="hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>
<p class="slogan">江湖未定 · 沧渊为王</p>
<div id="countdown">加载中...</div>
<div class="divider"></div>
</section>

<h2 style="text-align:center;">百業活動時間表</h2>

<div class="timeline">

<div class="item" data-start="23:00" data-end="23:59" data-days="all" data-name="百業派對">
<div class="time">每日 23:00</div>
<div class="content">🎉 百業派對</div>
</div>

<div class="item" data-start="21:30" data-end="23:00" data-days="1,3,5" data-name="副本">
<div class="time">一 / 三 / 五</div>
<div class="content">⚔ 百業副本</div>
</div>

<div class="item" data-start="22:00" data-end="23:00" data-days="6,0" data-name="百葉戰爭">
<div class="time">周末</div>
<div class="content">🔥 百葉戰爭</div>
</div>

<div class="item" data-start="21:00" data-end="22:00" data-days="2,4" data-name="一決高下">
<div class="time">周二 / 周四</div>
<div class="content">🏆 一決高下</div>
</div>

<div class="item" data-start="22:00" data-end="23:00" data-days="2,4" data-name="破軍殺將">
<div class="time">周二 / 周四</div>
<div class="content">⚡ 破軍殺將</div>
</div>

</div>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
🚀 加入 Discord
</a>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

<script>
// 粒子
const c=document.getElementById("particles");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;
let arr=[];
for(let i=0;i<60;i++){
arr.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}
setInterval(()=>{
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#22d3ee";
arr.forEach(p=>{
ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();
p.y+=0.3;if(p.y>c.height)p.y=0;
});
},30);

// 滚动动画
const items=document.querySelectorAll(".item");
function reveal(){
items.forEach(i=>{
if(i.getBoundingClientRect().top<window.innerHeight-100){
i.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

// 当前活动 + 倒计时
function update(){
const now=new Date();
const day=now.getDay();
const time=now.getHours()*60+now.getMinutes();

let next=null,min=99999;

items.forEach(i=>{
const ds=i.dataset.days;
const st=i.dataset.start.split(":").map(Number);
const et=i.dataset.end.split(":").map(Number);

const s=st[0]*60+st[1];
const e=et[0]*60+et[1];

let valid=ds==="all"||ds.split(",").includes(String(day));

i.classList.remove("active");

if(valid && time>=s && time<=e){
i.classList.add("active");

if(!i.querySelector(".tag")){
let t=document.createElement("div");
t.className="tag";
t.innerText="进行中";
i.querySelector(".content").appendChild(t);
}
}

let diff=s-time;
if(diff<0) diff+=1440;

if(diff<min){
min=diff;
next=i.dataset.name;
}
});

let h=Math.floor(min/60);
let m=min%60;

document.getElementById("countdown").innerText=
"下一场："+next+"（"+h+"小时"+m+"分钟）";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
