<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 百业网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    overflow-x:hidden;
    background:#020617;
}

/* 🌌 多层背景（视差感） */
.bg{
    position:fixed;
    inset:0;
    z-index:-3;
    overflow:hidden;
}

/* 主图层（你的 logo.png 做背景） */
.bg-main{
    position:absolute;
    inset:-5%;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8)),
      url('logo.png') center/cover no-repeat;
    filter:brightness(0.9) saturate(1.1);
    animation: slowZoom 30s ease-in-out infinite alternate;
}

/* 光晕层 */
.bg-glow{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 50% 40%, rgba(34,211,238,0.25), transparent 40%),
      radial-gradient(circle at 50% 60%, rgba(59,130,246,0.2), transparent 45%);
    mix-blend-mode:screen;
    animation: pulse 6s ease-in-out infinite;
}

/* 细颗粒层 */
.bg-noise{
    position:absolute;
    inset:0;
    opacity:.05;
    background-image:url('https://grainy-gradients.vercel.app/noise.svg');
}

/* 动画 */
@keyframes slowZoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.1); }
}
@keyframes pulse{
    0%,100%{ opacity:.6; }
    50%{ opacity:1; }
}

/* 首页（开场） */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* 标题 */
h1{
    font-size:88px;
    letter-spacing:6px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee,#a5f3fc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 40px rgba(34,211,238,.8);
}

/* 副标题 */
.hero p{
    margin-top:12px;
    color:#94a3b8;
    letter-spacing:2px;
}

/* 向下提示 */
.scroll-tip{
    position:absolute;
    bottom:30px;
    font-size:14px;
    color:#94a3b8;
    opacity:.8;
    animation: float 2s ease-in-out infinite;
}
@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(10px); }
}

/* 内容区 */
section{
    padding:100px 20px;
    text-align:center;
}

/* 标题 */
h2{
    font-size:36px;
    margin-bottom:40px;
    color:#38bdf8;
}

/* 卡片 */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:rgba(15,23,42,0.65);
    backdrop-filter:blur(12px);
    margin:15px;
    padding:25px;
    width:280px;
    border-radius:16px;
    border:1px solid rgba(56,189,248,0.2);
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px rgba(34,211,238,.7);
}

/* 按钮 */
.btn{
    display:inline-block;
    margin-top:40px;
    padding:16px 46px;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#22d3ee);
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:.3s;
}
.btn:hover{
    transform:scale(1.12);
    box-shadow:0 0 35px rgba(34,211,238,.9);
}

/* 页脚 */
footer{
    padding:40px;
    text-align:center;
    color:#64748b;
}
</style>
</head>

<body>

<!-- 🌌 背景 -->
<div class="bg">
    <div class="bg-main"></div>
    <div class="bg-glow"></div>
    <div class="bg-noise"></div>
</div>

<!-- 🐉 开场 -->
<section class="hero">
    <h1>沧渊阁</h1>
    <p>ID: 10260103</p>
    <div class="scroll-tip">▼ 向下滑动 ▼</div>
</section>

<!-- 📊 活动 -->
<section>
<h2>百業活動時間表</h2>

<div class="grid">
<div class="card">🎉 百業派對<br>每晚 23:00</div>
<div class="card">⚔ 副本<br>一/三/五 21:30</div>
<div class="card">🔥 百葉戰爭<br>周末 22:00</div>
<div class="card">🏆 一決高下<br>周二/四 21:00</div>
<div class="card">⚡ 破軍殺將<br>周二/四 22:00</div>
</div>

<!-- 🔗 加入 -->
<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
🚀 加入 Discord
</a>

</section>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

</body>
</html>
