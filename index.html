<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 百业网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    background:#020617;
    overflow-x:hidden;
}

/* 🌌 背景 */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(2,6,23,0.85),rgba(2,6,23,0.95)),
    url('logo.png');
    background-size:cover;
    background-position:center;
    z-index:-3;
}

/* ✨ 粒子层 */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-2;
}

/* 🐉 中央淡LOGO（解决空） */
.hero::after{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    background:url('logo.png') center/contain no-repeat;
    opacity:0.06;
    filter:blur(3px);
}

/* 💡 光圈 */
.hero::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:radial-gradient(circle,#22d3ee33,transparent);
    filter:blur(50px);
}

/* 首页 */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    position:relative;
}

/* 标题 */
h1{
    font-size:80px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    color:#94a3b8;
}

/* 标语 */
.slogan{
    margin-top:10px;
    color:#cbd5f5;
    letter-spacing:2px;
}

/* 倒计时 */
#countdown{
    margin-top:15px;
    font-size:22px;
    color:#38bdf8;
}

/* 时间轴 */
.timeline{
    max-width:900px;
    margin:60px auto;
    position:relative;
}

.timeline::before{
    content:'';
    position:absolute;
    left:50%;
    width:2px;
    height:100%;
    background:#22d3ee;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:40px 0;
}

.time{
    width:45%;
    text-align:right;
    color:#38bdf8;
}

.content{
    width:45%;
    padding:20px;
    background:rgba(15,23,42,0.7);
    border-radius:10px;
}

/* 当前活动 */
.active .content{
    border:2px solid #22d3ee;
    box-shadow:0 0 25px #22d3ee;
}

/* 按钮 */
.btn{
    display:block;
    margin:60px auto;
    padding:15px 40px;
    background:#22d3ee;
    color:white;
    text-decoration:none;
    width:max-content;
}

footer{
    text-align:center;
    padding:30px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<section class="hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>

<p class="slogan">江湖未定 · 沧渊为王</p>

<div id="countdown">加载中...</div>
</section>

<h2 style="text-align:center;">百業活動時間表</h2>

<div class="timeline">

<div class="item" data-start="23:00" data-end="23:59" data-days="all" data-name="百業派對">
<div class="time">每日 23:00</div>
<div class="content">🎉 百業派對</div>
</div>

<div class="item" data-start="21:30" data-end="23:00" data-days="1,3,5" data-name="副本">
<div class="time">一 / 三 / 五</div>
<div class="content">⚔ 百業副本</div>
</div>

<div class="item" data-start="22:00" data-end="23:00" data-days="6,0" data-name="百葉戰爭">
<div class="time">周末</div>
<div class="content">🔥 百葉戰爭</div>
</div>

<div class="item" data-start="21:00" data-end="22:00" data-days="2,4" data-name="一決高下">
<div class="time">周二 / 周四</div>
<div class="content">🏆 一決高下</div>
</div>

<div class="item" data-start="22:00" data-end="23:00" data-days="2,4" data-name="破軍殺將">
<div class="time">周二 / 周四</div>
<div class="content">⚡ 破軍殺將</div>
</div>

</div>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
加入 Discord
</a>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

<script>
// 粒子效果
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*1
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(34,211,238,0.6)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();
    });
    update();
}

function update(){
    particles.forEach(p=>{
        p.y += p.d;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
    });
}

setInterval(draw,30);

// 倒计时（简化版）
function updateCountdown(){
    document.getElementById("countdown").innerText="系统运行中...";
}
setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
