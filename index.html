<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 百业网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    background:#020617;
}

/* 背景 */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(2,6,23,0.85),rgba(2,6,23,0.95)),
    url('logo.png');
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* 首页 */
.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    font-size:80px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    color:#94a3b8;
}

/* 倒计时 */
#countdown{
    margin-top:20px;
    font-size:22px;
    color:#38bdf8;
}

/* 时间轴 */
.timeline{
    max-width:900px;
    margin:60px auto;
    position:relative;
}

.timeline::before{
    content:'';
    position:absolute;
    left:50%;
    width:2px;
    height:100%;
    background:#22d3ee;
    transform:translateX(-50%);
}

.item{
    display:flex;
    justify-content:space-between;
    margin:40px 0;
}

.time{
    width:45%;
    text-align:right;
    color:#38bdf8;
}

.content{
    width:45%;
    padding:20px;
    background:rgba(15,23,42,0.7);
    border-radius:10px;
}

/* 当前活动 */
.active .content{
    border:2px solid #22d3ee;
    box-shadow:0 0 25px #22d3ee;
}

/* 按钮 */
.btn{
    display:block;
    margin:60px auto;
    padding:15px 40px;
    background:#22d3ee;
    color:white;
    text-decoration:none;
    width:max-content;
}

footer{
    text-align:center;
    padding:30px;
}
</style>

</head>

<body>

<section class="hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>

<!-- 倒计时 -->
<div id="countdown">加载中...</div>

</section>

<h2 style="text-align:center;">百業活動時間表</h2>

<div class="timeline">

<div class="item" data-start="23:00" data-end="23:59" data-days="all" data-name="百業派對">
<div class="time">每日 23:00</div>
<div class="content">🎉 百業派對</div>
</div>

<div class="item" data-start="21:30" data-end="23:00" data-days="1,3,5" data-name="副本">
<div class="time">一 / 三 / 五</div>
<div class="content">⚔ 百業 / 俠境副本</div>
</div>

<div class="item" data-start="22:00" data-end="23:00" data-days="6,0" data-name="百葉戰爭">
<div class="time">周末</div>
<div class="content">🔥 百葉戰爭</div>
</div>

<div class="item" data-start="21:00" data-end="22:00" data-days="2,4" data-name="一決高下">
<div class="time">周二 / 周四</div>
<div class="content">🏆 一決高下</div>
</div>

<div class="item" data-start="22:00" data-end="23:00" data-days="2,4" data-name="破軍殺將">
<div class="time">周二 / 周四</div>
<div class="content">⚡ 破軍殺將</div>
</div>

</div>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
加入 Discord
</a>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

<script>
function getNextEvent(){
    const now = new Date();
    const currentDay = now.getDay();
    const currentTime = now.getHours()*60 + now.getMinutes();

    let nextEvent = null;
    let minDiff = Infinity;

    document.querySelectorAll(".item").forEach(item=>{
        const days = item.dataset.days;
        const start = item.dataset.start;
        const name = item.dataset.name;

        const [sh, sm] = start.split(":").map(Number);
        const startTime = sh*60 + sm;

        let validDays = [];

        if(days === "all"){
            validDays = [0,1,2,3,4,5,6];
        }else{
            validDays = days.split(",").map(Number);
        }

        validDays.forEach(day=>{
            let diffDay = (day - currentDay + 7) % 7;
            let diffTime = diffDay*1440 + startTime - currentTime;

            if(diffTime < 0) diffTime += 7*1440;

            if(diffTime < minDiff){
                minDiff = diffTime;
                nextEvent = name;
            }
        });
    });

    return {name: nextEvent, minutes: minDiff};
}

function updateCountdown(){
    const data = getNextEvent();
    const h = Math.floor(data.minutes/60);
    const m = data.minutes%60;

    document.getElementById("countdown").innerText =
    "下一场："+data.name+"（"+h+"小时 "+m+"分钟）";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
