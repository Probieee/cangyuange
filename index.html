<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>沧渊阁</title>

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:#cfefff;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;

    background:
    linear-gradient(rgba(2,6,23,0.45), rgba(2,6,23,0.75)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 颗粒效果 */
body::after{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.08;
    z-index:-1;
}

/* 标题 */
h1{
    font-family:"Noto Serif SC",serif;
    font-size:80px;
    color:#1e3a8a;
    text-align:center;
    margin-top:80px;
}

/* ID */
.id{
    text-align:center;
    color:#94a3b8;
    margin-top:10px;
    font-size:20px;
}

/* 倒计时 */
#countdown{
    text-align:center;
    margin-top:20px;
    font-size:26px;
    color:#22d3ee;
}

/* 标题 */
.section-title{
    text-align:center;
    font-size:32px;
    margin-top:40px;
}

/* 卡片 */
.timeline{
    width:900px;
    margin:40px auto;
}

/* 单项 */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 30px;
    margin:18px 0;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    font-size:22px;
}

/* 高亮 */
.active{
    background:rgba(34,211,238,0.2);
    box-shadow:0 0 25px #22d3ee;
    transform:scale(1.05);
}

/* 左右装饰 */
.left-text{
    position:fixed;
    left:30px;
    top:40%;
    font-size:40px;
    color:#22d3ee;
    writing-mode:vertical-rl;
}

.right-text{
    position:fixed;
    right:30px;
    top:40%;
    font-size:22px;
    color:#22d3ee;
    writing-mode:vertical-rl;
}

/* 按钮 */
.btn{
    display:block;
    width:240px;
    margin:40px auto;
    padding:16px;
    border-radius:30px;
    text-align:center;
    text-decoration:none;
    font-size:20px;
    color:white;

    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #22d3ee;
}

footer{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="left-text">沧渊阁</div>
<div class="right-text">兄弟集结 · 共闯江湖</div>

<h1>沧渊阁</h1>
<div class="id">ID: 10260103</div>

<div id="countdown">加载中...</div>

<div class="section-title">百业活动时间表</div>

<div class="timeline">

<div class="item" id="party">
    <div>🎉 百業派對</div>
    <div>每日 23:00</div>
</div>

<div class="item" id="dungeon">
    <div>⚔ 百業 / 俠境副本</div>
    <div>一/三/五 21:00 - 21:30</div>
</div>

<div class="item" id="war">
    <div>🔥 百葉戰爭</div>
    <div>周六/周日 22:00 - 23:00（联赛周六20:30）</div>
</div>

<div class="item" id="duel">
    <div>🏆 一決高下</div>
    <div>周二/周四 21:00 - 22:00</div>
</div>

<div class="item" id="kill">
    <div>⚡ 破軍殺將</div>
    <div>周二/周四 22:00 - 23:00</div>
</div>

</div>

<a class="btn" href="https://discord.gg/cangyuancrew" target="_blank">
🎮 加入 Discord
</a>

<footer>© 2026 沧渊阁 · Probieee</footer>

<script>
function getNow(){
    const now=new Date();
    return {
        day:now.getDay(),
        hour:now.getHours(),
        minute:now.getMinutes()
    }
}

function update(){
    const n=getNow();

    document.querySelectorAll(".item").forEach(e=>e.classList.remove("active"));

    // 周二/周四
    if([2,4].includes(n.day)){
        if(n.hour===21) document.getElementById("duel").classList.add("active");
        if(n.hour===22) document.getElementById("kill").classList.add("active");
    }

    // 周六周日
    if([0,6].includes(n.day)){
        if(n.hour===22) document.getElementById("war").classList.add("active");
    }

    // 每天23点
    if(n.hour===23){
        document.getElementById("party").classList.add("active");
    }
}

setInterval(update,1000);
update();
</script>

</body>
</html>
