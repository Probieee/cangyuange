<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>沧渊阁 · 百业网</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    color:white;
}

/* 首页 */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* LOGO图 */
.logo{
    width:300px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 25px #22d3ee);
}

/* 标题 */
.hero h1{
    font-size:70px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* 按钮 */
.btn{
    margin-top:20px;
    padding:12px 30px;
    border-radius:10px;
    background:linear-gradient(135deg,#3b82f6,#22d3ee);
    text-decoration:none;
    color:white;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #22d3ee;
}

/* 区块 */
section{
    padding:80px 20px;
    text-align:center;
}

h2{
    font-size:32px;
    margin-bottom:30px;
    color:#38bdf8;
}

/* 卡片 */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:rgba(30,41,59,0.7);
    margin:15px;
    padding:25px;
    width:300px;
    border-radius:15px;
    border:1px solid rgba(56,189,248,0.2);
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px #22d3ee;
}

/* 页脚 */
footer{
    padding:30px;
    text-align:center;
    color:#64748b;
}
</style>

</head>

<body>

<!-- 首页 -->
<section class="hero">

<!-- 这里是你的图片 -->
<img src="logo.png" class="logo">

<h1>沧渊阁</h1>

🚀 加入公会
</a>

</section>

<p>22:00 - 23:00</p>

</section>

<footer>
© 2026 沧渊阁 · 江湖不散

</body>
</html>
