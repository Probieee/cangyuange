<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>沧渊阁</title>

<!-- 标题字体 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:#cfefff;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    width:100%;height:100%;
    top:0;left:0;

    background:
    linear-gradient(rgba(2,6,23,0.45), rgba(2,6,23,0.75)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 颗粒 */
body::after{
    content:"";
    position:fixed;
    width:100%;height:100%;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.08;
    z-index:-1;
}

/* 标题 */
h1{
    font-family:"Noto Serif SC",serif;
    font-size:72px;
    color:#2f5fa5; /* 深蓝（刚好清晰） */
    text-align:center;
    margin-top:70px;
    letter-spacing:4px;
}

/* ID */
.id{
    text-align:center;
    color:#9fbad6;
    margin-top:10px;
    font-size:20px;
}

/* 倒计时 */
#countdown{
    text-align:center;
    margin-top:20px;
    font-size:24px;
    color:#38bdf8;
}

/* 标题 */
.section-title{
    text-align:center;
    font-size:28px;
    margin-top:40px;
}

/* 卡片 */
.timeline{
    width:820px;
    margin:35px auto;
}

/* 单项 */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 26px;
    margin:14px 0;
    border-radius:14px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    font-size:20px;
    color:#38bdf8;
}

/* 当前活动 */
.active{
    background:rgba(56,189,248,0.2);
    box-shadow:0 0 18px #38bdf8;
    transform:scale(1.03);
}

/* 左侧装饰 */
.left-text{
    position:fixed;
    left:30px;
    top:40%;
    font-size:42px;
    color:#38bdf8;
    writing-mode:vertical-rl;
    letter-spacing:6px;
}

/* 右侧装饰 */
.right-text{
    position:fixed;
    right:30px;
    top:40%;
    font-size:22px;
    color:#38bdf8;
    writing-mode:vertical-rl;
}

/* 按钮 */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    width:240px;
    margin:40px auto;
    padding:14px;
    border-radius:30px;

    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
    font-size:20px;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 18px #22d3ee;
}

footer{
    text-align:center;
    color:#94a3b8;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="left-text">沧渊阁</div>
<div class="right-text">兄弟集结 · 共闯江湖 · 沧渊为王</div>

<h1>沧渊阁</h1>
<div class="id">ID: 10260103</div>

<div id="countdown">加载中...</div>

<div class="section-title">百业活动时间表</div>

<div class="timeline">

<div class="item" id="party">
    <div>🎉 百業派對</div>
    <div>每晚 23:00</div>
</div>

<div class="item" id="dungeon">
    <div>⚔ 百業 / 俠境副本</div>
    <div>周一/三/五 21:00-21:30</div>
</div>

<div class="item" id="war">
    <div>🔥 百葉戰爭</div>
    <div>周六/周日 22:00-23:00（联赛周六20:30）</div>
</div>

<div class="item" id="duel">
    <div>🏆 一決高下</div>
    <div>周二/周四 21:00-22:00</div>
</div>

<div class="item" id="kill">
    <div>⚡ 破軍殺將</div>
    <div>周二/周四 22:00-23:00</div>
</div>

</div>

<footer>© 2026 沧渊阁 · Probieee</footer>

<script>
function update(){
    const now=new Date();
    const day=now.getDay();
    const hour=now.getHours();

    document.querySelectorAll(".item").forEach(e=>e.classList.remove("active"));

    if([2,4].includes(day)){
        if(hour===21) document.getElementById("duel").classList.add("active");
        if(hour===22) document.getElementById("kill").classList.add("active");
    }

    if([0,6].includes(day)){
        if(hour===22) document.getElementById("war").classList.add("active");
    }

    if(hour===23){
        document.getElementById("party").classList.add("active");
    }
}

setInterval(update,1000);
update();
</script>

</body>
</html>
