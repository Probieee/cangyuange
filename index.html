<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    background:#020617;
}

/* 背景 */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(2,6,23,0.7),rgba(2,6,23,0.9)),
    url('bg.jpg');
    background-size:cover;
    background-position:center;
    z-index:-1;
}

/* 左侧大字 */
.left-title{
    position:fixed;
    left:40px;
    top:120px;
    writing-mode:vertical-rl;
    font-size:48px;
    color:#38bdf8;
    letter-spacing:6px;
    opacity:0.8;
}

/* 左下说明 */
.left-box{
    position:fixed;
    left:40px;
    bottom:120px;
    color:#7dd3fc;
}

.left-box div{
    margin:15px 0;
}

/* 右侧文字 */
.right-text{
    position:fixed;
    right:40px;
    top:200px;
    writing-mode:vertical-rl;
    color:#7dd3fc;
    letter-spacing:4px;
}

/* 主体 */
.hero{
    text-align:center;
    padding-top:80px;
}

h1{
    font-size:72px;
    background:linear-gradient(90deg,#60a5fa,#22d3ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#countdown{
    margin-top:10px;
    font-size:22px;
    color:#38bdf8;
}

/* 时间轴框 */
.timeline{
    width:800px;
    margin:40px auto;
    padding:30px;
    border-radius:15px;
    background:rgba(10,20,40,0.7);
    backdrop-filter:blur(10px);
    position:relative;
}

/* 中线 */
.line{
    position:absolute;
    left:35%;
    top:40px;
    bottom:40px;
    width:2px;
    background:#22d3ee;
}

/* item */
.item{
    display:flex;
    align-items:center;
    margin:25px 0;
}

/* 时间 */
.time{
    width:30%;
    text-align:right;
    padding-right:20px;
    color:#38bdf8;
}

/* 节点 */
.dot{
    width:12px;
    height:12px;
    background:#22d3ee;
    border-radius:50%;
    margin:0 15px;
}

/* 内容 */
.content{
    flex:1;
    padding:15px 20px;
    background:rgba(15,23,42,0.6);
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

/* 当前活动 */
.active{
    transform:scale(1.08);
}

.active .content{
    border:2px solid #22d3ee;
    box-shadow:0 0 30px #22d3ee;
}

/* 进行中 */
.now{
    position:absolute;
    left:-140px;
    color:#22d3ee;
    font-size:22px;
}

/* 按钮 */
.btn{
    display:block;
    width:220px;
    margin:40px auto;
    padding:15px;
    text-align:center;
    border-radius:30px;
    background:linear-gradient(135deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
    font-size:18px;
}

footer{
    text-align:center;
    margin:30px;
}
</style>
</head>

<body>

<script>
function pad(n){return n.toString().padStart(2,"0");}

function update(){
    const now=new Date();
    const h=pad(now.getHours());
    const m=pad(now.getMinutes());
    const s=pad(now.getSeconds());

    document.getElementById("countdown").innerText=
    "当前时间："+h+":"+m+":"+s;
}
setInterval(update,1000);
update();
</script>

</body>
</html>
