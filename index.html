<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沧渊阁 · 百业网</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    overflow-x:hidden;
}

/* ✅ 背景（统一用 bg.jpg） */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(2,6,23,0.75), rgba(2,6,23,0.95)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    z-index:-1;
}

/* 标题字体 */
h1{
    font-family: 'Ma Shan Zheng', cursive;
    font-size:80px;
    color:#38bdf8;
    text-shadow:
        0 0 10px #22d3ee,
        0 0 30px #22d3ee,
        0 0 60px #0ea5e9;
}

/* 左侧标题 */
.left-title{
    position:fixed;
    left:40px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:40px;
    color:#38bdf8;
    opacity:0.6;
}

/* 左侧内容 */
.left-box{
    position:fixed;
    left:40px;
    bottom:60px;
    font-size:14px;
    color:#7dd3fc;
    line-height:28px;
}

/* 右侧文字 */
.right-text{
    position:fixed;
    right:40px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:14px;
    color:#7dd3fc;
    line-height:28px;
}

/* 主体 */
.hero{
    text-align:center;
    padding-top:80px;
}

/* 倒计时 */
#countdown{
    margin-top:10px;
    color:#38bdf8;
    font-size:18px;
}

/* 时间表 */
.timeline{
    margin:40px auto;
    width:600px;
    background:rgba(255,255,255,0.03);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(10px);
}

.item{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    margin:10px 0;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
}

/* 当前活动高亮 */
.active{
    transform:scale(1.05);
    background:rgba(56,189,248,0.2);
    box-shadow:0 0 20px #38bdf8;
}

/* 按钮 */
.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 40px;
    border-radius:30px;
    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
}

/* 底部 */
footer{
    text-align:center;
    margin:40px 0;
    color:#94a3b8;
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
</head>

<body>

<div class="left-title">沧渊阁</div>

<div class="left-box">
⚔ 百业齐聚<br>
👥 兄弟集结<br>
👑 沧渊为王
</div>

<div class="right-text">
兄弟集结 共闯江湖<br>
永不独行 沧渊为王
</div>

<section class="hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>

<div id="countdown">加载中...</div>

<h2 style="margin-top:30px;">百业活动时间表</h2>

<div class="timeline">
<div class="item">🎉 百业派对 <span>23:00</span></div>
<div class="item">⚔ 百业副本 <span>21:30</span></div>
<div class="item">🔥 百业战争 <span>22:00</span></div>
<div class="item active">🏆 一决高下 <span>21:00</span></div>
<div class="item">⚡ 破军杀将 <span>22:00</span></div>
</div>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
🚀 加入 Discord
</a>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

</section>

<script>
function getNextEvent(){
    const now = new Date();
    const currentMinutes = now.getHours()*60 + now.getMinutes();

    const events = [
        {name:"百业派对", start:23*60},
        {name:"百业副本", start:21*60+30},
        {name:"百业战争", start:22*60},
        {name:"一决高下", start:21*60},
        {name:"破军杀将", start:22*60}
    ];

    let next = null;
    let diff = 9999;

    events.forEach(e=>{
        let d = e.start - currentMinutes;
        if(d<0) d += 1440;

        if(d < diff){
            diff = d;
            next = e.name;
        }
    });

    return {name:next, minutes:diff};
}

function update(){
    const data = getNextEvent();
    const h = Math.floor(data.minutes/60);
    const m = data.minutes%60;

    document.getElementById("countdown").innerText =
    "下一场：" + data.name + "（"+h+"小时 "+m+"分钟）";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
