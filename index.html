<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沧渊阁 · 百业网</title>

<!-- 字体 -->
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:white;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(2,6,23,0.75), rgba(2,6,23,0.95)),
    url("bg.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    z-index:-1;
}

/* 主体 */
.hero{
    text-align:center;
    padding-top:80px;
}

/* 标题（降低亮度版） */
h1{
    font-family:'Ma Shan Zheng',cursive;
    font-size:90px;
    color:#7dd3fc;

    text-shadow:
        0 0 6px #22d3ee,
        0 0 12px rgba(34,211,238,0.5);
}

/* ID */
.hero p{
    color:#cbd5f5;
    margin-top:10px;
    font-size:20px;
}

/* 倒计时 */
#countdown{
    margin-top:20px;
    font-size:24px;
    color:#38bdf8;
}

/* 标题 */
.section-title{
    margin-top:40px;
    font-size:30px;
    color:#e2e8f0;
}

/* 卡片 */
.timeline{
    width:850px;
    margin:30px auto;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(12px);
}

/* 行 */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 25px;
    margin:12px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    font-size:20px;
    transition:0.3s;
}

/* 高亮 */
.active{
    background:rgba(34,211,238,0.2);
    box-shadow:0 0 25px #22d3ee;
    transform:scale(1.05);
}

/* 左右 */
.left{color:#38bdf8;}
.right{color:#e2e8f0;}

/* Discord按钮 */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    margin-top:40px;
    padding:16px 45px;
    border-radius:30px;
    background:linear-gradient(90deg,#5865F2,#22d3ee);
    color:white;
    text-decoration:none;
    font-size:20px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #22d3ee;
}

/* Discord图标 */
.btn img{
    width:24px;
}

/* 页脚 */
footer{
    margin-top:40px;
    text-align:center;
    color:#94a3b8;
    font-size:16px;
}
</style>
</head>

<body>

<section class="hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>

<div id="countdown">加载中...</div>

<div class="section-title">百业活动时间表</div>

<div class="timeline">

<div class="item">
<div class="left">🎉 百業派對</div>
<div class="right">每日 23:00</div>
</div>

<div class="item">
<div class="left">⚔ 百業/俠境副本</div>
<div class="right">周一/三/五 21:00 - 21:30</div>
</div>

<div class="item">
<div class="left">🔥 百葉戰爭</div>
<div class="right">周末 22:00 - 23:00<br>（联赛 周六 20:30）</div>
</div>

<div class="item active">
<div class="left">🏆 一決高下</div>
<div class="right">周二/周四 21:00 - 22:00</div>
</div>

<div class="item">
<div class="left">⚡ 破軍殺將</div>
<div class="right">周二/周四 22:00 - 23:00</div>
</div>

</div>

<a href="https://discord.gg/cangyuancrew" target="_blank" class="btn">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png">
加入 Discord
</a>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

</section>

<script>
function getNextEvent(){
    const now = new Date();
    const day = now.getDay();
    const time = now.getHours()*60 + now.getMinutes();

    const events = [
        {name:"百業派對", days:[0,1,2,3,4,5,6], start:1380},
        {name:"副本", days:[1,3,5], start:1260},
        {name:"百葉戰爭", days:[0,6], start:1320},
        {name:"一決高下", days:[2,4], start:1260},
        {name:"破軍殺將", days:[2,4], start:1320}
    ];

    let next=null, min=9999;

    events.forEach(e=>{
        e.days.forEach(d=>{
            let diffDay=(d-day+7)%7;
            let diff=diffDay*1440 + e.start - time;
            if(diff<0) diff+=1440;

            if(diff<min){
                min=diff;
                next=e.name;
            }
        });
    });

    return {name:next, minutes:min};
}

function update(){
    const d=getNextEvent();
    const h=Math.floor(d.minutes/60);
    const m=d.minutes%60;

    document.getElementById("countdown").innerText =
    "下一场："+d.name+"（"+h+"小时 "+m+"分钟）";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
