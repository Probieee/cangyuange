<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:#cfefff;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(2,6,23,0.45), rgba(2,6,23,0.75)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 颗粒 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.08;
    z-index:-1;
}

/* 标题 */
h1{
    font-family:"Noto Serif SC",serif;
    font-size:70px;
    color:#77B3D4; /* 清晰蓝 */
    text-align:center;
    margin-top:60px;
}

/* ID */
.id{
    text-align:center;
    color:#77B3D4;
    margin-top:10px;
    font-size:18px;
}

/* 标题 */
.section-title{
    text-align:center;
    font-size:26px;
    margin-top:30px;
}

/* 卡片 */
.timeline{
    width:780px;
    margin:30px auto;
}

/* 单项 */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 22px;
    margin:12px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(8px);
    font-size:18px;
}

/* 左右 */
.left{
    display:flex;
    align-items:center;
    gap:10px;
    color:#77B3D4;
}

.right{
    color:#77B3D4;
}

/* 当前活动 */
.active{
    background:rgba(56,189,248,0.2);
    box-shadow:0 0 12px #77B3D4;
}

/* 左装饰 */
.left-text{
    position:fixed;
    left:20px;
    top:40%;
    font-size:36px;
    color:#77B3D4;
    writing-mode:vertical-rl;
}

/* 右装饰 */
.right-text{
    position:fixed;
    right:20px;
    top:40%;
    font-size:20px;
    color:#77B3D4;
    writing-mode:vertical-rl;
}

/* 按钮 */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;

    width:220px;
    margin:30px auto;
    padding:12px;
    border-radius:30px;

    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
}

footer{
    text-align:center;
    color:#94a3b8;
    margin:20px;
}
</style>
</head>

<body>

<div class="left-text">沧渊阁</div> 
<div class="right-text">兄弟集结 · 共闯江湖</div>

<h1>沧渊阁</h1>

<div class="section-title">百业活动时间表</div>

<div class="timeline">

</div>

<script>
const events = [
{ id:"party", name:"百業派對", days:[0,1,2,3,4,5,6], start:1380 },
{ id:"dungeon", name:"百業副本", days:[1,3,5], start:1260 },
{ id:"war", name:"百葉戰爭", days:[0,6], start:1320 },
{ id:"duel", name:"一決高下", days:[2,4], start:1260 },
{ id:"kill", name:"破軍殺將", days:[2,4], start:1320 }
];

function getNow(){
    const n=new Date();
    return {day:n.getDay(), time:n.getHours()*60+n.getMinutes()};
}

function getNext(){
    const now=getNow();
    let min=999999, next=null;

    events.forEach(e=>{
        e.days.forEach(d=>{
            let diff=(d-now.day+7)%7;
            let t=diff*1440 + e.start - now.time;

            if(diff===0 && e.start <= now.time){
                t += 7*1440;
            }

            if(t < min){
                min = t;
                next = e;
            }
        });
    });

    return {event:next, minutes:min};
}

function update(){
    const now=getNow();

    document.querySelectorAll(".item").forEach(e=>e.classList.remove("active"));

    // 当前活动
    events.forEach(e=>{
        if(e.days.includes(now.day)){
            if(now.time >= e.start && now.time <= e.start + 60){
                document.getElementById(e.id).classList.add("active");
            }
        }
    });

    // 下一场
    const next=getNext();
    const h=Math.floor(next.minutes/60);
    const m=next.minutes%60;

    document.getElementById("nextEvent").innerText =
        "下一场：" + next.event.name + "（" + h + "小时 " + m + "分钟）";
}

setInterval(update,1000);
update();
</script>

</body>
