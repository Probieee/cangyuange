<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沧渊阁 · 百业网</title>

<!-- 标题字体 -->
<link href="https://fonts.googleapis.com/css2?family=Long+Cang&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    height:100%;
    font-family:"Microsoft YaHei",sans-serif;
    background:black;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    linear-gradient(rgba(2,6,23,0.45), rgba(2,6,23,0.65)),
    url("bg.jpg");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:-1;
}

/* 左右武侠文字 */
.left-side{
    position:fixed;
    left:30px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:48px;
    color:#38bdf8;
    opacity:0.7;
    letter-spacing:8px;
}

.right-side{
    position:fixed;
    right:30px;
    top:50%;
    transform:translateY(-50%);
    writing-mode:vertical-rl;
    font-size:28px;
    color:#7dd3fc;
    opacity:0.6;
    line-height:2;
}

/* 主体 */
.hero{
    text-align:center;
    padding-top:80px;
}

/* 标题 */
h1{
    font-family:'Long Cang', cursive;
    font-size:100px;
    color:#7dd3fc;
    letter-spacing:10px;
}

/* ID */
.hero p{
    font-size:20px;
    color:#cbd5f5;
    margin-top:10px;
}

/* 倒计时 */
#countdown{
    margin-top:20px;
    font-size:26px;
    color:#22d3ee;
}

/* 标题 */
.section-title{
    margin-top:50px;
    font-size:34px;
    color:#e2e8f0;
}

/* 卡片 */
.timeline{
    width:900px;
    margin:40px auto;
    padding:30px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
}

/* 每一项 */
.item{
    padding:25px;
    margin:18px 0;
    border-radius:16px;
    background:rgba(255,255,255,0.1);
}

/* 活动名称 */
.item-title{
    font-size:26px;
    color:#38bdf8;
    margin-bottom:10px;
}

/* 时间 */
.item-time{
    font-size:20px;
    color:#e2e8f0;
}

/* 按钮 */
.btn{
    display:inline-flex;
    align-items:center;
    gap:12px;
    margin-top:50px;
    padding:18px 50px;
    border-radius:40px;
    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
    font-size:20px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

/* footer */
footer{
    margin-top:40px;
    text-align:center;
    color:#94a3b8;
    font-size:14px;
}
</style>
</head>

<body>

<!-- 左 -->
<div class="left-side">沧渊阁</div>

<!-- 右 -->
<div class="right-side">
兄弟集结 · 共闯江湖<br>
永不独行 · 沧渊为王
</div>

<section class="hero">
    <h1>沧渊阁</h1>
    <p>ID: 10260103</p>

    <div id="countdown">加载中...</div>

    <div class="section-title">百业活动时间表</div>

    <div class="timeline">

        <div class="item">
            <div class="item-title">🎉 百業派對</div>
            <div class="item-time">每日 23:00</div>
        </div>

        <div class="item">
            <div class="item-title">⚔ 百業 / 俠境副本</div>
            <div class="item-time">一 / 三 / 五 21:00 - 21:30</div>
        </div>

        <div class="item">
            <div class="item-title">🔥 百葉戰爭</div>
            <div class="item-time">
                周六 / 周日 22:00 - 23:00<br>
                （固定联赛：周六 20:30）
            </div>
        </div>

        <div class="item">
            <div class="item-title">🏆 一決高下</div>
            <div class="item-time">周二 / 周四 21:00 - 22:00</div>
        </div>

        <div class="item">
            <div class="item-title">⚡ 破軍殺將</div>
            <div class="item-time">周二 / 周四 22:00 - 23:00</div>
        </div>

    </div>

    <a href="https://discord.gg/" class="btn">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" width="22">
        加入 Discord
    </a>

</section>

<footer>
© 2026 沧渊阁 · Probieee
</footer>

<script>
function updateCountdown(){
    const now = new Date();
    const current = now.getHours()*60 + now.getMinutes();

    const events = [
        {name:"百業派對", time:23*60},
        {name:"百業副本", time:21*60},
        {name:"百葉戰爭", time:22*60},
        {name:"一決高下", time:21*60},
        {name:"破軍殺將", time:22*60},
    ];

    let minDiff = 9999;
    let next = "";

    events.forEach(e=>{
        let diff = e.time - current;
        if(diff < 0) diff += 1440;
        if(diff < minDiff){
            minDiff = diff;
            next = e.name;
        }
    });

    const h = Math.floor(minDiff/60);
    const m = minDiff%60;

    document.getElementById("countdown").innerText =
        "下一场：" + next + "（" + h + "小时 " + m + "分钟）";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
