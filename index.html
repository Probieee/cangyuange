<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>沧渊阁 · 官网</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:"Microsoft YaHei",sans-serif;
    color:#e2e8f0;
    overflow-x:hidden;
}

/* 背景 */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(2,6,23,0.55),rgba(2,6,23,0.85)),
    url("bg.jpg");
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* 粒子 */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://grainy-gradients.vercel.app/noise.svg");
    opacity:0.08;
    animation:grain 8s infinite;
    z-index:-1;
}

@keyframes grain{
    0%{transform:translate(0,0)}
    50%{transform:translate(-5%,5%)}
    100%{transform:translate(0,0)}
}

/* 顶部导航 */
.nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:center;
    gap:30px;
    padding:15px;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    z-index:10;
}

.nav button{
    background:none;
    border:none;
    color:#cfefff;
    font-size:16px;
    cursor:pointer;
    padding:8px 18px;
    border-radius:20px;
}

.nav button.active{
    background:#38bdf8;
    color:black;
}

/* 英雄区 */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.hero h1{
    font-family:"Noto Serif SC";
    font-size:90px;
    color:#77B3D4;
}

.hero p{
    margin-top:10px;
    color:#94a3b8;
}

/* 页面 */
.page{
    display:none;
    padding-top:100px;
    animation:fade 0.5s;
}

.page.active{
    display:block;
}

@keyframes fade{
    from{opacity:0}
    to{opacity:1}
}

/* 招募 */
.guild-box{
    width:850px;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
}

.guild-title{
    font-size:26px;
    color:#38bdf8;
    text-align:center;
    margin-bottom:20px;
}

/* 活动 */
.timeline{
    width:800px;
    margin:30px auto;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:20px;
    margin:10px 0;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
}

.active{
    box-shadow:0 0 20px #38bdf8;
    transform:scale(1.05);
}

/* 按钮 */
.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 40px;
    border-radius:30px;
    background:linear-gradient(90deg,#3b82f6,#22d3ee);
    color:white;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #22d3ee;
}
</style>
</head>

<body>

<!-- 导航 -->
<div class="nav">
<button class="active" onclick="showPage('home',this)">首页</button>
<button onclick="showPage('guild',this)">招募</button>
<button onclick="showPage('event',this)">活动</button>
</div>

<!-- 首页 -->
<div id="home" class="page active hero">
<h1>沧渊阁</h1>
<p>ID: 10260103</p>
<a class="btn" href="https://discord.gg/cangyuancrew" target="_blank">加入 Discord</a>
</div>

<!-- 招募 -->
<div id="guild" class="page">
<div class="guild-box">
<div class="guild-title">🇲🇾 沧渊阁招贤</div>
<p>探索休闲 · 轻松活跃 · 欢迎所有玩家</p>
<p>🌙 夜猫 · 🀄 麻将 · 🔥 活跃玩家</p>
</div>
</div>

<!-- 活动 -->
<div id="event" class="page">
<div id="nextEvent" style="text-align:center;font-size:22px;"></div>

<div class="timeline">
<div class="item" id="party">🎉 百业派对 - 23:00</div>
<div class="item" id="dungeon">⚔ 副本 - 21:00</div>
<div class="item" id="war">🔥 战争 - 22:00</div>
<div class="item" id="duel">🏆 一决 - 21:00</div>
<div class="item" id="kill">⚡ 破军 - 22:00</div>
</div>
</div>

<script>
function showPage(id,btn){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}
</script>

</body>
</html>
